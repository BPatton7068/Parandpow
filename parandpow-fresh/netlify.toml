[[redirects]]
  from = "/destinations"
  to = "/pages/destinations.html"
  status = 200

[[redirects]]
  from = "/gear-reviews"
  to = "/pages/gear-reviews.html"
  status = 200

[[redirects]]
  from = "/travel-guides"
  to = "/pages/travel-guides.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/pages/about.html"
  status = 200

[[redirects]]
  from = "/merch"
  to = "/pages/merch.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/pages/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/pages/terms.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/blog"
  to = "/pages/blog.html"
  status = 200

[[redirects]]
  from = "/blog/*"
  to = "/blog/:splat.html"
  status = 200

[[redirects]]
  from = "/destinations/:slug"
  to = "/destinations/:slug.html"
  status = 200
